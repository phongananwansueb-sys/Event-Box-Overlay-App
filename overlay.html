<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtitle Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: transparent; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 52px;
      font-family: 'Noto Sans Thai', 'Inter', sans-serif;
    }
    /* ── ล็อก fixed overlay layer ── */
    #fixedLayer {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 99999;
    }
    #fixedLayer > * { pointer-events: auto; }

    .drag-handle {
      position: fixed; top: 0; left: 0; right: 0;
      height: 48px; z-index: 9999;
      display: none; align-items: center; justify-content: center;
      background: rgba(99,179,237,0.15);
      border-bottom: 2px solid rgba(99,179,237,0.5);
      backdrop-filter: blur(12px);
      cursor: grab; user-select: none;
      -webkit-app-region: drag;
    }
    .drag-handle.visible { display: flex; }
    .drag-handle-label { font-size: 0.78rem; font-weight: 700; color: rgba(99,179,237,0.9); letter-spacing: 0.08em; pointer-events: none; }
    .drag-handle-dots { display: flex; gap: 3px; margin-right: 8px; pointer-events: none; }
    .drag-handle-dots span { width: 4px; height: 4px; border-radius: 50%; background: rgba(99,179,237,0.7); }

    /* ── Wrapper ── */
    .subtitle-wrapper {
      display: flex; flex-direction: column;
      align-items: center; max-width: 90vw; text-align: center;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .subtitle-wrapper.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }

    /* ── Interim slot ── */
    .interim-slot {
      width: 100%; min-height: 2.8rem;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 5px;
    }

    /* ── Final slot ── */
    .final-slot { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; }

    /* ── sub-group animations ── */
    .sub-group { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }

    /* Animation ON (default) */
    .anim-on .sub-group.entering  { animation: slideIn 0.26s cubic-bezier(0.22,1,0.36,1) forwards; }
    .anim-on .sub-group.exiting   { animation: slideOut 0.26s cubic-bezier(0.55,0,1,0.45) forwards; }
    .anim-on .sub-group.interim-group             { animation: interimFadeIn  0.18s ease forwards; }
    .anim-on .sub-group.interim-group.fading-out  { animation: interimFadeOut 0.18s ease forwards; }

    /* Animation OFF — ไม่มี animation เลย */
    .anim-off .sub-group.entering  { opacity: 1; transform: none; }
    .anim-off .sub-group.exiting   { display: none; }
    .anim-off .sub-group.interim-group             { opacity: 1; }
    .anim-off .sub-group.interim-group.fading-out  { opacity: 0; }

    @keyframes slideIn  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-16px)} }
    @keyframes interimFadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes interimFadeOut { from{opacity:1} to{opacity:0} }

    /* ── sub-line (เหมือนเดิม 100% — สีถูก override ด้วย CSS variable) ── */
    .sub-line {
      display: inline-block; padding: 9px 26px; border-radius: 10px;
      font-weight: 700; line-height: 1.4; letter-spacing: 0.01em; word-break: break-word;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: font-size 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      color: var(--sub-final-text, #ffffff);
      background: var(--sub-final-bg, rgba(0,0,0,0.72));
    }
    .sub-original     { font-size: 2rem; }
    .sub-translated   { font-size: 1.55rem; }

    /* ── [แก้ไข] Translation colors ใช้ CSS variables แทน hardcode ── */
    .sub-translated.tl-0 { color: var(--sub-trans-0-text, #a8d8ff); background: var(--sub-trans-0-bg, rgba(0,0,0,0.72)); }
    .sub-translated.tl-1 { color: var(--sub-trans-1-text, #b9f6ca); background: var(--sub-trans-1-bg, rgba(0,0,0,0.72)); }
    .sub-translated.tl-2 { color: var(--sub-trans-2-text, #ffe082); background: var(--sub-trans-2-bg, rgba(0,0,0,0.72)); }

    /* interim group — override ด้วย interim variables */
    .sub-group.interim-group .sub-line {
      opacity: 0.45; font-style: italic;
      color: var(--sub-interim-text, #ffffff);
      background: var(--sub-interim-bg, rgba(0,0,0,0.50));
    }
  </style>
  <style>
    /* ── HOVER ZONE BUTTON — มุมขวาบน ── */
    #hoverBtn {
      position: fixed; top: 12px; left: 12px; z-index: 99999;
      background: rgba(10,10,10,0.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 8px 14px; color: #efefef; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; display: none; align-items: center; gap: 6px;
      font-family: 'Noto Sans Thai','Inter',sans-serif;
      transition: opacity 0.15s, transform 0.15s;
      user-select: none;
    }
    #hoverBtn.visible { display: flex; }
    #hoverBtn:hover   { background: rgba(30,30,30,0.95); border-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<!-- ── HOVER ZONE BUTTON — เปลี่ยน URL ── -->
<div id="fixedLayer">
  <div id="hoverBtn" onclick="requestChangeUrl()">
    🔗 เปลี่ยน URL งาน
  </div>
</div>

<div class="drag-handle" id="dragHandle">
  <div class="drag-handle-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="drag-handle-label">ลาก Overlay ไปวางตำแหน่งที่ต้องการ</div>
</div>

<!-- anim-on เป็น default เหมือนเดิม -->
<div class="subtitle-wrapper anim-on" id="subWrapper">
  <div class="interim-slot" id="interimSlot"></div>
  <div class="final-slot"   id="finalSlot"></div>
</div>

<script>
  const wrapper     = document.getElementById('subWrapper');
  const interimSlot = document.getElementById('interimSlot');
  const finalSlot   = document.getElementById('finalSlot');
  const dragHandle  = document.getElementById('dragHandle');

  let finalGroup        = null;
  let interimGroup      = null;
  let exitTimer         = null;
  let interimClearTimer = null;
  let interimFadeTimer  = null;

  let currentScaleFinal   = 1.0;
  let currentScaleInterim = 1.0;
  const BASE_ORIGINAL   = 2.00;
  const BASE_TRANSLATED = 1.55;

  // ── helper แปล hex+opacity → rgba string (เหมือนเดิม 100%) ──
  function hexToRgba(hex, opacityPct) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0,2), 16);
    const g = parseInt(h.substring(2,4), 16);
    const b = parseInt(h.substring(4,6), 16);
    const a = Math.max(0, Math.min(100, opacityPct)) / 100;
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── [แก้ไข] apply subtitle style จาก SSE event ──
  // เพิ่มเฉพาะส่วน trans_colors — ทุกอย่างอื่นเหมือนเดิม 100%
  function applySubtitleStyle(s) {
    const root = document.documentElement;
    // text colors (เหมือนเดิม)
    root.style.setProperty('--sub-final-text',   s.final_text_color   || '#ffffff');
    root.style.setProperty('--sub-interim-text',  s.interim_text_color || '#ffffff');
    // background (เหมือนเดิม)
    const finalBg   = hexToRgba(s.final_bg_color   || '#000000', s.final_bg_opacity   ?? 72);
    const interimBg = hexToRgba(s.interim_bg_color || '#000000', s.interim_bg_opacity ?? 50);
    root.style.setProperty('--sub-final-bg',   finalBg);
    root.style.setProperty('--sub-interim-bg', interimBg);
    // animation toggle (เหมือนเดิม)
    if (s.animation === false) {
      wrapper.classList.remove('anim-on');
      wrapper.classList.add('anim-off');
    } else {
      wrapper.classList.remove('anim-off');
      wrapper.classList.add('anim-on');
    }
    // ── [เพิ่มใหม่] trans_colors — set CSS variables สำหรับแต่ละ slot ──
    const transColors = s.trans_colors || [];
    const TRANS_DEFAULTS = [
      { text: '#a8d8ff', bg: '#000000', bg_opacity: 72 },
      { text: '#b9f6ca', bg: '#000000', bg_opacity: 72 },
      { text: '#ffe082', bg: '#000000', bg_opacity: 72 },
    ];
    for (let i = 0; i < 3; i++) {
      const slot = transColors[i] || TRANS_DEFAULTS[i];
      root.style.setProperty(`--sub-trans-${i}-text`, slot.text || TRANS_DEFAULTS[i].text);
      root.style.setProperty(`--sub-trans-${i}-bg`,   hexToRgba(slot.bg || '#000000', slot.bg_opacity ?? 72));
    }
  }

  function applyScale(scale) {
    currentScaleFinal = scale;
    if (finalGroup) {
      finalGroup.querySelectorAll('.sub-original').forEach(el => { el.style.fontSize = (BASE_ORIGINAL * scale) + 'rem'; });
      finalGroup.querySelectorAll('.sub-translated').forEach(el => { el.style.fontSize = (BASE_TRANSLATED * scale) + 'rem'; });
    }
  }

  function applyScaleInterim(scale) {
    currentScaleInterim = scale;
    interimSlot.style.minHeight = (BASE_ORIGINAL * scale * 1.4 + 0.4) + 'rem';
    if (interimGroup) {
      interimGroup.querySelectorAll('.sub-original').forEach(el => { el.style.fontSize = (BASE_ORIGINAL * scale) + 'rem'; });
    }
  }

  function setOverlayVisible(visible) { visible ? wrapper.classList.remove('hidden') : wrapper.classList.add('hidden'); }
  function setDraggable(enabled)      { enabled ? dragHandle.classList.add('visible') : dragHandle.classList.remove('visible'); }

  function makeSubLine(className, text, isInterim = false) {
    const el = document.createElement('div');
    el.className = 'sub-line ' + className;
    el.textContent = text;
    const scale = isInterim ? currentScaleInterim : currentScaleFinal;
    if (className.includes('sub-original'))   el.style.fontSize = (BASE_ORIGINAL   * scale) + 'rem';
    if (className.includes('sub-translated')) el.style.fontSize = (BASE_TRANSLATED * scale) + 'rem';
    return el;
  }

  const _TENANT = new URLSearchParams(window.location.search).get('tenant') || 'default';
  const _EVENT  = new URLSearchParams(window.location.search).get('event')  || 'default';
  // ส่งทั้ง tenant และ event ไปใน stream URL เพื่อให้ subscribe ถูก channel
  (function() {
    const p = [];
    if (_TENANT !== 'default') p.push('tenant=' + _TENANT);
    if (_EVENT  !== 'default') p.push('event='  + _EVENT);
    const _streamUrl = window.location.origin + '/stream' + (p.length ? ('?' + p.join('&')) : '');
    window._es = new EventSource(_streamUrl);
  })();
  const es = window._es;
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'connected' || data.type === 'ping') return;
    if (data.type === 'overlay-visible')    { setOverlayVisible(data.visible); return; }
    if (data.type === 'set-draggable')      { setDraggable(data.enabled); return; }
    if (data.type === 'clear-interim')      { removeInterimGroup(); return; }
    if (data.type === 'clear')              { clearAll(); return; }
    if (data.type === 'interim')            { showInterim(data.text); return; }
    if (data.type === 'final')              { showFinal(data.original, data.translations, data.show_original); return; }
    if (data.type === 'font-scale')         { applyScale(data.scale); return; }
    if (data.type === 'font-scale-interim') { applyScaleInterim(data.scale); return; }
    if (data.type === 'subtitle-style')     { applySubtitleStyle(data); return; }
  };
  es.onerror = () => {};

  function clearAll() {
    clearTimeout(exitTimer); clearTimeout(interimClearTimer); clearTimeout(interimFadeTimer);
    interimSlot.innerHTML = ''; finalSlot.innerHTML = '';
    finalGroup = null; interimGroup = null; lastFinalKey = '';
  }

  function removeInterimGroup(animated = true) {
    clearTimeout(interimClearTimer); clearTimeout(interimFadeTimer);
    if (!interimGroup) return;
    if (animated && interimGroup.parentNode) {
      interimGroup.classList.add('fading-out');
      interimFadeTimer = setTimeout(() => {
        if (interimGroup && interimGroup.parentNode) interimGroup.remove();
        interimGroup = null;
      }, 180);
    } else {
      if (interimGroup.parentNode) interimGroup.remove();
      interimGroup = null;
    }
  }

  function showInterim(text) {
    if (!text || !text.trim()) return;
    clearTimeout(interimClearTimer); clearTimeout(interimFadeTimer);
    if (!interimGroup || !interimGroup.parentNode) {
      const group = document.createElement('div');
      group.className = 'sub-group interim-group';
      group.appendChild(makeSubLine('sub-original', text.trim(), true));
      interimSlot.appendChild(group);
      interimGroup = group;
    } else {
      const el = interimGroup.querySelector('.sub-line');
      if (el) el.textContent = text.trim();
    }
    interimClearTimer = setTimeout(() => removeInterimGroup(true), 2000);
  }

  let lastFinalKey = '';

  function showFinal(original, translations, showOriginal) {
    const key = (original || '') + '|' + (translations || []).map(t => t.text).join('|');
    if (key && key === lastFinalKey) return;
    lastFinalKey = key;

    removeInterimGroup(false);

    if (finalGroup) {
      const old = finalGroup;
      old.classList.remove('entering'); old.classList.add('exiting');
      clearTimeout(exitTimer);
      exitTimer = setTimeout(() => { if (old.parentNode) old.remove(); }, 280);
    }

    const group = buildGroup(original, translations, showOriginal);
    group.classList.add('entering');
    finalSlot.appendChild(group);
    finalGroup = group;
  }

  function buildGroup(original, translations, showOriginal = true) {
    const group = document.createElement('div');
    group.className = 'sub-group';
    if (showOriginal && original) group.appendChild(makeSubLine('sub-original', original));
    if (translations && translations.length > 0) {
      translations.forEach((t, i) => {
        if (!t.text) return;
        group.appendChild(makeSubLine('sub-translated tl-' + i, t.text));
      });
    }
    return group;
  }

  // ── HOVER ZONE — รับ event จาก main process ผ่าน preload ──
  if (window.electronAPI) {
    window.electronAPI.onHoverZone((active) => {
      const btn = document.getElementById('hoverBtn');
      if (active) btn.classList.add('visible');
      else        btn.classList.remove('visible');
    });
  }

  function requestChangeUrl() {
    if (window.electronAPI) window.electronAPI.changeUrl();
  }
</script>
</body>
</html>
